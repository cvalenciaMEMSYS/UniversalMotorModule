; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

; =============================================================================
; COMMON SETTINGS
; =============================================================================
[common]
lib_deps = 
    teemuatlut/TMCStepper@^0.7.3
    gin66/FastAccelStepper@^0.33.9

; =============================================================================
; ESP32-S3 Super Mini (Hardware Target)
; =============================================================================
[env:esp32-s3-mini]
platform = espressif32@6.9.0 ; this speciic version is required for the correct ESP 2.x core instead of the now updated 3.x core which made changes to the LEDC functions
board = lolin_s3_mini ; Similar board with 4MB flash
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps = ${common.lib_deps}

; Build flags - Force USB-CDC mode
build_flags = 
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

; =============================================================================
; NATIVE TEST ENVIRONMENT (PC Unit Testing)
; =============================================================================
[env:native]
platform = native
build_flags = 
    -std=c++17
    -DUNITY_INCLUDE_FLOAT
    -DNATIVE_BUILD
    -I test/mocks
    -I src
build_src_filter = 
    +<../test/mocks/Arduino.cpp>
test_build_src = false
lib_compat_mode = off
